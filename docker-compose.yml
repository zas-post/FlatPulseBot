services:
  flat_pulse_bot:
    container_name: flat_pulse_bot
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    environment:
      - TZ=Europe/Moscow
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      - ./database:/app/database
      - ./errors.log:/app/errors.log
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
